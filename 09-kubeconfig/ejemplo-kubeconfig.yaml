# ============================================================
# EJEMPLO COMPLETO DE UN FICHERO KUBECONFIG
# Ubicación por defecto:
#   Linux/Mac  →  ~/.kube/config
#   Windows    →  %USERPROFILE%\.kube\config
# ============================================================

apiVersion: v1
kind: Config

# ------------------------------------------------------------
# CLUSTERS
# Cada entrada define dónde está un cluster (API Server) y
# cómo verificar su identidad (certificado CA).
# ------------------------------------------------------------
clusters:
  - name: local-server                   # nombre clave — se referencia desde los contextos
    cluster:
      server: http://localhost:8080       # URL del API Server
      # certificate-authority: /ruta/ca.crt   # ruta al cert de la CA del cluster
      # insecure-skip-tls-verify: true         # omitir verificación TLS (solo entornos de prueba)

  - name: produccion
    cluster:
      server: https://192.168.1.100:6443
      certificate-authority: /etc/kubernetes/pki/ca.crt

# ------------------------------------------------------------
# USERS
# Cada entrada define las credenciales que el CLIENTE usa
# para identificarse ante el API Server.
# ------------------------------------------------------------
users:
  - name: myself                         # nombre clave — se referencia desde los contextos
    user:
      username: admin                    # autenticación básica HTTP
      password: secret                   # texto plano (no Base64)
      # token y username/password son MUTUAMENTE EXCLUYENTES

  - name: desarrollo1
    user:
      token: eyJhbGciOiJSUzI1NiIsInR...  # token JWT (ServiceAccount, OIDC, etc.)

  - name: desarrollo2
    user:
      client-certificate: path/al/certificado.crt  # certificado mTLS del cliente
      client-key: path/a/clave-de-cliente.key       # clave privada correspondiente
      # certificate y client-key se pueden combinar con token

# ------------------------------------------------------------
# CONTEXTS
# Une cluster + usuario + namespace bajo un nombre.
# Es el "perfil de conexión" que usa kubectl.
# ------------------------------------------------------------
contexts:
  - name: default-context               # nombre del contexto
    context:
      cluster: local-server             # referencia a clusters[].name
      user: myself                      # referencia a users[].name
      namespace: the-right-prefix       # namespace por defecto para este contexto

  - name: context-desarrollo
    context:
      cluster: produccion
      user: desarrollo1
      namespace: trabajo

# ------------------------------------------------------------
# CURRENT-CONTEXT
# Contexto activo cuando no se indica otro.
# Se cambia con: kubectl config use-context <nombre>
# ------------------------------------------------------------
current-context: default-context

preferences: {}
